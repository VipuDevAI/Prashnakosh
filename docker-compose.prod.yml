# =============================================================================
# PRASHNAKOSH - Production Docker Compose
# Services: App + PostgreSQL + Nginx
# =============================================================================

services:
  app:
    image: ghcr.io/smartgenedux/prashnakosh:latest
    container_name: prashnakosh-app
    restart: always
    environment:
      - DATABASE_URL=postgresql://prashnakosh:${DB_PASSWORD}@db:5432/prashnakosh
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - PORT=5000
      - STORAGE_ROOT=/data
    volumes:
      - ${DATA_DIR:-E:/PrashnakoshData}/uploads:/data/uploads
      - ${DATA_DIR:-E:/PrashnakoshData}/exports:/data/exports
      - ${DATA_DIR:-E:/PrashnakoshData}/backups:/data/backups
      - ${DATA_DIR:-E:/PrashnakoshData}/logs/app:/data/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - prashnakosh

  db:
    image: postgres:16-alpine
    container_name: prashnakosh-db
    restart: always
    environment:
      - POSTGRES_DB=prashnakosh
      - POSTGRES_USER=prashnakosh
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - ${DATA_DIR:-E:/PrashnakoshData}/postgres/data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prashnakosh"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
        -c shared_buffers=4GB
        -c effective_cache_size=12GB
        -c work_mem=64MB
        -c maintenance_work_mem=1GB
        -c max_connections=100
        -c wal_buffers=64MB
        -c random_page_cost=1.1
        -c checkpoint_completion_target=0.9
        -c log_statement=mod
        -c log_min_duration_statement=1000
    networks:
      - prashnakosh

  nginx:
    image: nginx:alpine
    container_name: prashnakosh-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ${DATA_DIR:-E:/PrashnakoshData}/logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - prashnakosh

networks:
  prashnakosh:
    driver: bridge
